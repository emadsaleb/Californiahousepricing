<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>California House Price Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #0d6efd;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card bg-white">

    <h2 class="title">🏡 California House Price Predictor</h2>

    <form action="/predict" method="post">

        <div class="row">

            <div class="col-md-6 mb-3">
                <input type="text" name="MedInc" class="form-control" placeholder="Median Income" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="HouseAge" class="form-control" placeholder="House Age" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="AveRooms" class="form-control" placeholder="Average Rooms" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="AveBedrms" class="form-control" placeholder="Average Bedrooms" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="Population" class="form-control" placeholder="Population" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="AveOccup" class="form-control" placeholder="Average Occupancy" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="Latitude" class="form-control" placeholder="Latitude" required>
            </div>

            <div class="col-md-6 mb-3">
                <input type="text" name="Longitude" class="form-control" placeholder="Longitude" required>
            </div>

        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
                Predict Price
            </button>
        </div>

    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}

</div>

</body>
</html>
